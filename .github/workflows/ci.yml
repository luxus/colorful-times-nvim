# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lua and LuaRocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks

      - name: Install luacheck
        run: |
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          luacheck lua/ plugin/ tests/

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim-version: ["stable", "nightly"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix['neovim-version'] }}

      - name: Install Dependencies
        run: |
          nvim --headless +'!mkdir -p ~/.local/share/nvim/site/pack/plugins/start' +qall
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/plugins/start/plenary.nvim

      - name: Run Tests
        run: |
          nvim --headless \
            -u tests/minimal_init.vim \
            -c "PlenaryBustedDirectory tests/ { minimal_init = './tests/minimal_init.vim' }"
